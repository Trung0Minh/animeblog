name: Tests

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  unit-and-integration:
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:15
        env:
          POSTGRES_DB: animeblog_test
          POSTGRES_PASSWORD: postgres
          POSTGRES_USER: postgres
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    env:
      AUTH_SECRET: ci-test-secret
      DATABASE_URL: postgresql://postgres:postgres@localhost:5432/animeblog_test
      DIRECT_URL: postgresql://postgres:postgres@localhost:5432/animeblog_test
      NEXT_PUBLIC_APP_NAME: Anime Blog Test
      NEXT_PUBLIC_APP_URL: http://127.0.0.1:3000
      NEXTAUTH_SECRET: ci-test-secret
      NEXTAUTH_URL: http://127.0.0.1:3000
      RESEND_API_KEY: re_test_fake_key
      RESEND_FROM_EMAIL: test@example.com

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          cache: npm
          node-version: 20

      - run: npm ci

      - name: Generate Prisma client
        run: npx prisma generate

      - name: Run Prisma migrations
        run: npx prisma migrate deploy

      - name: Run unit and integration tests
        run: npx vitest run --reporter=verbose

  e2e:
    runs-on: ubuntu-latest
    needs: unit-and-integration

    services:
      postgres:
        image: postgres:15
        env:
          POSTGRES_DB: animeblog_e2e
          POSTGRES_PASSWORD: postgres
          POSTGRES_USER: postgres
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    env:
      AUTH_SECRET: ci-test-secret
      DATABASE_URL: postgresql://postgres:postgres@localhost:5432/animeblog_e2e
      DIRECT_URL: postgresql://postgres:postgres@localhost:5432/animeblog_e2e
      NEXT_PUBLIC_APP_NAME: Anime Blog E2E
      NEXT_PUBLIC_APP_URL: http://127.0.0.1:3000
      NEXTAUTH_SECRET: ci-test-secret
      NEXTAUTH_URL: http://127.0.0.1:3000
      NODE_ENV: test
      RESEND_API_KEY: re_test_fake_key
      RESEND_FROM_EMAIL: test@example.com

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          cache: npm
          node-version: 20

      - run: npm ci

      - name: Install Playwright browsers
        run: npx playwright install --with-deps chromium

      - name: Run Prisma migrations and seed
        run: |
          npx prisma migrate deploy
          npx prisma db seed

      - name: Run E2E tests
        run: npx playwright test

      - uses: actions/upload-artifact@v4
        if: failure()
        with:
          name: playwright-report
          path: playwright-report/
